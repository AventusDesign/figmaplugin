<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>:root {
  --bg-primary: #1e1e1e;
  --bg-secondary: #2c2c2c;
  --bg-tertiary: #383838;
  --text-primary: #ffffff;
  --text-secondary: #8a8a8a;
  --accent: #0d99ff;
  --pink: #ff4785;
  --border: #3a3a3a;
  --spacing-color: #ff7200;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
}

.hidden {
  display: none !important;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.toggle-pill {
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}

.toggle-pill.active {
  background: var(--spacing-color);
  color: #fff;
  border-color: var(--spacing-color);
}

.header-selects {
  display: flex;
  align-items: center;
  gap: 6px;
}

.format-select {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  cursor: pointer;
}

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 11px;
  border-bottom: 2px solid transparent;
}

.tab.active {
  color: var(--text-primary);
  border-bottom-color: var(--accent);
}

.sub-tabs {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.sub-tab {
  padding: 4px 12px;
  border-radius: 4px;
  border: none;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 10px;
}

.sub-tab.active {
  background: var(--accent);
  color: #fff;
}

/* Content */
.content {
  padding: 0;
  overflow-y: auto;
  height: calc(100vh - 90px);
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-secondary);
  font-size: 12px;
  padding: 24px;
  text-align: center;
}

/* Node header */
.node-header {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.node-name {
  font-weight: 600;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.node-type {
  font-size: 9px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 400;
}

.node-size {
  color: var(--text-secondary);
  margin-top: 4px;
  font-size: 11px;
}

.master-link {
  color: var(--accent);
  font-size: 10px;
  margin-top: 4px;
}

/* Sections */
.section {
  border-bottom: 1px solid var(--border);
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  cursor: pointer;
  user-select: none;
}

.section-header:hover {
  background: var(--bg-secondary);
}

.section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.section-actions {
  display: flex;
  gap: 4px;
}

.icon-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  font-size: 12px;
  line-height: 1;
}

.icon-btn:hover {
  color: var(--text-primary);
  background: var(--bg-tertiary);
}

.section-body {
  padding: 0 12px 12px;
}

.section.collapsed .section-body {
  display: none;
}

/* List view rows */
.prop-row {
  display: flex;
  align-items: baseline;
  padding: 2px 0;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 10px;
  line-height: 1.6;
}

.prop-name {
  color: var(--text-primary);
  min-width: 110px;
}

.prop-value {
  color: var(--pink);
  word-break: break-all;
}

.prop-value.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 10px;
}

.color-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}

.swatch {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1px solid var(--border);
  flex-shrink: 0;
  cursor: pointer;
}

.swatch:hover {
  outline: 2px solid var(--accent);
}

.color-info {
  flex: 1;
  min-width: 0;
}

.color-var {
  font-size: 10px;
  color: var(--text-primary);
}

.color-hex {
  font-size: 10px;
  color: var(--text-secondary);
  font-family: monospace;
}

.color-usage {
  font-size: 9px;
  color: var(--text-secondary);
}

/* Code blocks */
.code-block {
  position: relative;
  background: var(--bg-secondary);
  border-radius: 4px;
  padding: 8px;
  margin-bottom: 8px;
}

.code-block pre {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 10px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}

.css-prop {
  color: var(--text-primary);
}

.css-val {
  color: var(--pink);
}

.code-copy {
  position: absolute;
  top: 4px;
  right: 4px;
}

/* Variables */
.var-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}

.var-row:last-child {
  border-bottom: none;
}

.var-name {
  font-size: 10px;
  color: var(--text-primary);
}

.var-value {
  font-size: 10px;
  color: var(--pink);
  font-family: monospace;
}

/* Export */
.export-section {
  padding: 12px;
  height: calc(100vh - 120px);
  overflow-y: auto;
}

#export-sub-tabs {
  display: none;
}

#export-panel:not(.hidden) #export-sub-tabs {
  display: flex;
}

.export-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 8px;
}

.export-toolbar-left {
  font-size: 10px;
  color: var(--text-secondary);
}

.export-all-btn {
  padding: 6px 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
}

.export-all-btn:disabled {
  opacity: 0.4;
  cursor: default;
}

.asset-kind {
  display: inline-block;
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 6px;
  font-weight: 600;
}

.asset-kind.icon {
  background: rgba(13, 153, 255, 0.2);
  color: var(--accent);
}

.asset-kind.image {
  background: rgba(255, 71, 133, 0.2);
  color: var(--pink);
}

.asset-kind.other {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}

.asset-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}

.asset-type-label {
  font-size: 9px;
  color: var(--text-secondary);
}

.asset-controls {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 8px;
}

.asset-controls .form-select {
  flex: 1;
  min-width: 0;
}

.asset-export-btn {
  padding: 5px 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
}

.asset-export-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.export-quick-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}

.asset-card {
  background: var(--bg-secondary);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 8px;
}

.asset-name {
  font-weight: 500;
  font-size: 11px;
  margin-bottom: 2px;
}

.asset-size {
  color: var(--text-secondary);
  font-size: 10px;
  margin-bottom: 8px;
}

.export-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.export-btn {
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 10px;
  cursor: pointer;
}

.export-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.export-form {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.form-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.form-label {
  font-size: 10px;
  color: var(--text-secondary);
  min-width: 50px;
}

.form-select {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 10px;
}

.primary-btn {
  width: 100%;
  padding: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  margin-top: 4px;
}

.primary-btn:hover {
  opacity: 0.9;
}

.copied {
  color: #4caf50 !important;
}

/* Box model */
.box-model-section {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}

.box-model-wrap {
  background: var(--bg-secondary);
  border-radius: 8px;
  padding: 20px 28px 28px;
  position: relative;
}

.box-model-outer {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.margin-indicator {
  font-size: 10px;
  font-family: monospace;
  color: var(--text-secondary);
  line-height: 1;
}

.margin-indicator.top {
  color: var(--pink);
  margin-bottom: 4px;
}

.margin-indicator.bottom {
  color: var(--accent);
  margin-top: 4px;
}

.box-model-middle {
  display: flex;
  align-items: center;
  width: 100%;
  justify-content: center;
  gap: 4px;
}

.margin-indicator.side {
  color: var(--accent);
  min-width: 16px;
  text-align: center;
}

.box-border {
  flex: 1;
  max-width: 220px;
  border: 1px dashed var(--border);
  border-radius: 6px;
  padding: 18px 14px 14px;
  position: relative;
  background: var(--bg-primary);
}

.box-border-label,
.box-padding-label {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 8px;
  color: var(--text-secondary);
  text-transform: capitalize;
}

.radius-label {
  position: absolute;
  font-size: 8px;
  color: var(--text-secondary);
  font-family: monospace;
}

.radius-label.tl { top: 2px; left: 14px; }
.radius-label.tr { top: 2px; right: 14px; }
.radius-label.bl { bottom: 2px; left: 14px; }
.radius-label.br { bottom: 2px; right: 14px; }

.border-weight {
  position: absolute;
  font-size: 8px;
  color: var(--text-secondary);
  font-family: monospace;
}

.border-weight.top { top: 4px; left: 50%; transform: translateX(-50%); }
.border-weight.bottom { bottom: 4px; left: 50%; transform: translateX(-50%); }
.border-weight.left { left: 4px; top: 50%; transform: translateY(-50%); }
.border-weight.right { right: 4px; top: 50%; transform: translateY(-50%); }

.box-padding {
  background: rgba(13, 153, 255, 0.15);
  border: 1px solid rgba(13, 153, 255, 0.3);
  border-radius: 4px;
  padding: 18px 12px 12px;
  position: relative;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pad-label {
  position: absolute;
  font-size: 9px;
  font-family: monospace;
  color: var(--accent);
}

.pad-label.top { top: 2px; left: 50%; transform: translateX(-50%); }
.pad-label.bottom { bottom: 2px; left: 50%; transform: translateX(-50%); }
.pad-label.left { left: 4px; top: 50%; transform: translateY(-50%); }
.pad-label.right { right: 4px; top: 50%; transform: translateY(-50%); }

.box-content {
  border: 1px dashed var(--text-secondary);
  border-radius: 2px;
  padding: 8px 12px;
  font-size: 10px;
  font-family: monospace;
  color: var(--text-primary);
  background: var(--bg-tertiary);
  white-space: nowrap;
}

.box-sizing-tag {
  position: absolute;
  bottom: 6px;
  right: 10px;
  font-size: 8px;
  color: var(--text-secondary);
}

/* Copyable rows */
.prop-row,
.var-row {
  position: relative;
  padding-right: 24px;
}

.prop-row .copy-prop,
.var-row .copy-prop,
.color-row-main .copy-prop {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0;
  transition: opacity 0.1s;
}

.prop-row:hover .copy-prop,
.var-row:hover .copy-prop,
.color-group:hover .copy-prop {
  opacity: 1;
}

.color-group {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.color-group:last-child {
  border-bottom: none;
}

.color-row-main {
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
  padding-right: 24px;
}

.color-usages {
  margin-left: 24px;
  margin-top: 2px;
}

.color-usage-item {
  font-size: 9px;
  color: var(--text-secondary);
  padding: 1px 0;
}
</style>
</head>
